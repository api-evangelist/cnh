    description: >-
      The CNH Developer Portal at develop.cnh.com hosts onboarding,
      authentication guidance, API guides, Postman collections, and curated
      SwaggerHub documentation for FieldOps and related CNH APIs. Developers
      register for credentials, obtain refresh tokens, and progress from sandbox
      to live data through the portal.
