description: >-
  CNH Industrial is a global leader in the manufacturing and distribution of
  agricultural and construction equipment, with brands including Case IH, New
  Holland, STEYR, Case CE, and New Holland Construction. Through develop.cnh.com
  CNH operates a developer portal that exposes the FieldOps API - a unified,
  ISO 15143-3 compliant REST API for vehicle telemetry, equipment management,
  farm/grower hierarchy, operations, prescription Rx delivery, and webhook
  subscriptions across both agronomic machinery and construction equipment.
apis:
  - aid: cnh:cnh-fieldops-api
    name: CNH FieldOps API
    tags:
      - Agriculture
