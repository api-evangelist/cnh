      - url: https://develop.cnh.com/get-started
        type: GettingStarted
      - url: https://develop.cnh.com/api-guides
        type: Documentation
      - url: https://develop.cnh.com/api-guides/fieldops-api
        type: Reference
      - url: https://develop.cnh.com/api-guides/fieldops-api/vehicle-telemetry
        type: Reference
